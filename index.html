<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TippSegéd Pro 3.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .version { text-align: center; font-size: 12px; color: #7f8c8d; margin-bottom: 20px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab.active { color: #27ae60; border-bottom: 3px solid #27ae60; }
        .section { display: none; }
        .section.active { display: block; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #219653; }
        .results { margin-top: 25px; padding: 15px; background: #f9f9f9; border-radius: 8px; border-left: 5px solid #27ae60; }
        .result-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .result-item:last-child { border-bottom: none; }
        .stars { color: #f1c40f; font-size: 18px; }
        .score-list { margin-top: 10px; padding-left: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>TippSegéd Pro 3.0</h1>
    <div class="version">Készítette: Zsolt & AI</div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('pre')">Meccs előtti</div>
        <div class="tab" onclick="switchTab('live')">Élő (Live) elemző</div>
    </div>

    <div id="pre-mode" class="section active">
        <div class="input-group"><label>Hazai lőtt gólátlag:</label><input type="number" id="home_att" step="0.1" value="1.8"></div>
        <div class="input-group"><label>Hazai kapott gólátlag:</label><input type="number" id="home_def" step="0.1" value="1.0"></div>
        <div class="input-group"><label>Vendég lőtt gólátlag:</label><input type="number" id="away_att" step="0.1" value="1.2"></div>
        <div class="input-group"><label>Vendég kapott gólátlag:</label><input type="number" id="away_def" step="0.1" value="1.5"></div>
        <div class="input-group"><label>Fogadóiroda Over 2.5 odds (opcionális):</label><input type="number" id="bookie_odds" step="0.01" placeholder="pl. 1.85"></div>
        <button onclick="szamolPreMeccs()">Kalkuláció Indítása</button>
    </div>

    <div id="live-mode" class="section">
        <div class="input-group"><label>Játékperc:</label><input type="number" id="live_minute" value="65"></div>
        <div class="input-group"><label>Aktuális állás (Hazai - Vendég):</label>
            <div style="display:flex; gap:10px;"><input type="number" id="live_gh" value="1"> <input type="number" id="live_ga" value="0"></div>
        </div>
        <div class="input-group"><label>Kapura lövések (Hazai / Vendég):</label>
            <div style="display:flex; gap:10px;"><input type="number" id="live_sh" value="6"> <input type="number" id="live_sa" value="2"></div>
        </div>
        <div class="input-group"><label>Labdabirtoklás % (Hazai / Vendég):</label>
            <div style="display:flex; gap:10px;"><input type="number" id="live_possh" value="58"> <input type="number" id="live_possa" value="42"></div>
        </div>
        <div class="input-group"><label>Szögletek (Hazai / Vendég):</label>
            <div style="display:flex; gap:10px;"><input type="number" id="live_ch" value="7"> <input type="number" id="live_ca" value="2"></div>
        </div>
        <button onclick="szamolLiveMeccs()" style="background-color: #e67e22;">Élő kalkuláció</button>
    </div>

    <div id="output" style="display:none;" class="results"></div>
</div>

<script src="app.js"></script>
</body>
</html>
