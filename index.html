<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TippSegéd Pro 4.0</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --danger: #e74c3c;
            --border: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 24px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            color: #1a252f;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        .results {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid var(--bg);
            display: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .value-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            background: #f8f9fa;
            border-left: 4px solid var(--primary);
        }

        .value-box.no-value {
            border-left-color: var(--danger);
        }

        .badge {
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>TippSegéd Pro 4.0</h1>
    <div class="subtitle">Készítette: Zsolt & AI</div>

    <div class="form-group">
        <label for="hazaiLott">Hazai csapat lőtt gólátlaga (hazai pályán):</label>
        <input type="number" id="hazaiLott" step="0.1" placeholder="pl. 1.8">
    </div>

    <div class="form-group">
        <label for="hazaiKapott">Hazai csapat kapott gólátlaga (hazai pályán):</label>
        <input type="number" id="hazaiKapott" step="0.1" placeholder="pl. 1.2">
    </div>

    <div class="form-group">
        <label for="vendegLott">Vendég csapat lőtt gólátlaga (idegenben):</label>
        <input type="number" id="vendegLott" step="0.1" placeholder="pl. 1.5">
    </div>

    <div class="form-group">
        <label for="vendegKapott">Vendég csapat kapott gólátlaga (idegenben):</label>
        <input type="number" id="vendegKapott" step="0.1" placeholder="pl. 1.6">
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

    <div class="form-group">
        <label for="oddsOver">Iroda Over 2.5 Odds (opcionális):</label>
        <input type="number" id="oddsOver" step="0.01" placeholder="pl. 1.75">
    </div>

    <div class="form-group">
        <label for="oddsGG">Iroda GG (Mindkét csapat lő gólt) Odds (opcionális):</label>
        <input type="number" id="oddsGG" step="0.01" placeholder="pl. 1.80">
    </div>

    <button onclick="szamol()">Kalkuláció Indítása</button>

    <div id="results" class="results">
        <h3>Elemzési Eredmények</h3>
        
        <div class="result-item">
            <span>Várható hazai gól (xG):</span>
            <strong id="resHazaiXG">0.00</strong>
        </div>
        <div class="result-item">
            <span>Várható vendég gól (xG):</span>
            <strong id="resVendegXG">0.00</strong>
        </div>
        <div class="result-item">
            <span>Összes várható gól:</span>
            <strong id="resOsszXG">0.00</strong>
        </div>

        <h4 style="margin-top: 15px; margin-bottom: 10px;">Valószínűségek</h4>
        
        <div class="result-item">
            <span>Hazai 1.5+ gól esély:</span>
            <strong id="resHazai15">0%</strong>
        </div>
        <div class="result-item">
            <span>Vendég 1.5+ gól esély:</span>
            <strong id="resVendeg15">0%</strong>
        </div>
        <div class="result-item">
            <span>Mindkét csapat lő gólt (GG):</span>
            <strong id="resGG">0%</strong>
        </div>
        <div class="result-item">
            <span>Több mint 2.5 gól (Over 2.5):</span>
            <strong id="resOver25">0%</strong>
        </div>

        <div id="valueAnalysis"></div>
    </div>
</div>

<script>
function szamol() {
    const hazaiLott = parseFloat(document.getElementById('hazaiLott').value) || 0;
    const hazaiKapott = parseFloat(document.getElementById('hazaiKapott').value) || 0;
    const vendegLott = parseFloat(document.getElementById('vendegLott').value) || 0;
    const vendegKapott = parseFloat(document.getElementById('vendegKapott').value) || 0;

    const oddsOver = parseFloat(document.getElementById('oddsOver').value) || 0;
    const oddsGG = parseFloat(document.getElementById('oddsGG').value) || 0;

    if (hazaiLott === 0 && vendegLott === 0) {
        alert('Kérlek adj meg érvényes gólátlagokat!');
        return;
    }

    // xG Számítás
    const hazaiXG = (hazaiLott + vendegKapott) / 2;
    const vendegXG = (vendegLott + hazaiKapott) / 2;
    const osszXG = hazaiXG + vendegXG;

    // Valószínűségek (Poisson-közelítés)
    const hazaiGolEsely = 1 - Math.exp(-hazaiXG);
    const vendegGolEsely = 1 - Math.exp(-vendegXG);
    
    // GG Esély
    const ggEsely = (hazaiGolEsely * vendegGolEsely) * 100;

    // Hazai/Vendég 1.5+ Esély
    const hazai15Esely = (1 - Math.exp(-hazaiXG) * (1 + hazaiXG)) * 100;
    const vendeg15Esely = (1 - Math.exp(-vendegXG) * (1 + vendegXG)) * 100;

    // Over 2.5 Esély
    let over25Esely = (1 - Math.exp(-osszXG) * (1 + osszXG + (Math.pow(osszXG, 2) / 2))) * 100;
    if (over25Esely < 0) over25Esely = 0;
    if (over25Esely > 100) over25Esely = 100;

    // Eredmények kiírása
    document.getElementById('resHazaiXG').innerText = hazaiXG.toFixed(2);
    document.getElementById('resVendegXG').innerText = vendegXG.toFixed(2);
    document.getElementById('resOsszXG').innerText = osszXG.toFixed(2);

    document.getElementById('resHazai15').innerText = hazai15Esely.toFixed(1) + '%';
    document.getElementById('resVendeg15').innerText = vendeg15Esely.toFixed(1) + '%';
    document.getElementById('resGG').innerText = ggEsely.toFixed(1) + '%';
    document.getElementById('resOver25').innerText = over25Esely.toFixed(1) + '%';

    // Piaci Értékelemzés
    let valueHTML = 'h4 style="margin-top: 15px; margin-bottom: 10px;">Piaci Értékelemzés (VALUE)</h4>';
    let hasValueCheck = false;

    if (oddsOver > 0) {
        hasValueCheck = true;
        const realisOverOdds = 100 / over25Esely;
        const isValue = oddsOver > realisOverOdds;
        
        valueHTML += `
            <div class="value-box ${isValue ? '' : 'no-value'}">
                <strong>Over 2.5 Érték:</strong><br>
                Reális odds: <b>${realisOverOdds.toFixed(2)}</b> | Iroda odds: <b>${oddsOver.toFixed(2)}</b><br>
                <span class="badge ${isValue ? 'badge-success' : 'badge-danger'}">
                    ${isValue ? '✔ Van érték az oddsban (VALUE)' : '❌ Nincs érték az oddsban'}
                </span>
            </div>
        `;
    }

    if (oddsGG > 0) {
        hasValueCheck = true;
        const realisGGOdds = 100 / ggEsely;
        const isValue = oddsGG > realisGGOdds;
        
        valueHTML += `
            <div class="value-box ${isValue ? '' : 'no-value'}">
                <strong>GG (Mindkét csapat lő gólt) Érték:</strong><br>
                Reális odds: <b>${realisGGOdds.toFixed(2)}</b> | Iroda odds: <b>${oddsGG.toFixed(2)}</b><br>
                <span class="badge ${isValue ? 'badge-success' : 'badge-danger'}">
                    ${isValue ? '✔ Van érték az oddsban (VALUE)' : '❌ Nincs érték meglévő oddsra'}
                </span>
            </div>
        `;
    }

    if (!hasValueCheck) {
        valueHTML = '';
    }

    document.getElementById('valueAnalysis').innerHTML = valueHTML;
    document.getElementById('results').style.display = 'block';
}
</script>

</body>
</html>
